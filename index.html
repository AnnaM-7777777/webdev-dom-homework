<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments" id="commentsList">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>

          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>

          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>

        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>

          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>

          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like" onclick="likeComment(this)"></button>
            </div>
          </div>
        </li>
      </ul>

      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
          id="addFormName"
        />

        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
          id="addFormText"
        ></textarea>

        <div class="add-form-row">
          <button class="add-form-button" id="addFormButton" type="button">Написать</button>
        </div>
      </div>
    </div>

    <script> 
      document.getElementById('addFormButton').addEventListener('click', function() {
        const commentsList = document.getElementById("commentsList");
        const button = document.getElementById("addFormButton");
        const inputFormName = document.getElementById("addFormName");
        const inputFormText = document.getElementById("addFormText");

        // Валидация полей
        inputFormName.classList.remove("error");
        inputFormText.classList.remove("error");
        
        if (inputFormName.value.trim() === '' || inputFormText.value.trim() === '') {

          // Добавляем класс "error" к полям, которые не прошли проверку
          if (inputFormName.value.trim() === '') {
              inputFormName.classList.add("error");
          }

          if (inputFormText.value.trim() === '') {
              inputFormText.classList.add("error");
          }
          
          return;
        }

        const dateElement = new Date().toLocaleString(); // Находим элемент, в который будет выводиться дата

        const options = {
          year: '2-digit', // Указываем, что год должен отображаться двумя цифрами
          month: '2-digit', // Указываем, что месяц должен отображаться двумя цифрами
          day: '2-digit', // Указываем, что день должен отображаться двумя цифрами
          hour: '2-digit', // Указываем, что часы должны отображаться двумя цифрами
          minute: '2-digit', // Указываем, что минуты должны отображаться двумя цифрами
        };

        const formattedDate = new Date().toLocaleString('ru-RU', options); // Форматируем дату и выводим её в элемент
        const formattedDateNew = formattedDate.replace(',', ''); // Убираем запятую после даты и выводим дату в элемент

        // Создаём новый комментарий с помощью шаблонной строки
        const oldHtml = commentsList.innerHTML;
        commentsList.innerHTML = oldHtml + `
          <li class="comment">
            <div class="comment-header">
              <div>${inputFormName.value}</div>
              <div>${formattedDateNew}</div>
            </div>

            <div class="comment-body">
              <div class="comment-text">
                ${inputFormText.value}
              </div>
            </div>

            <div class="comment-footer">
              <div class="likes">
                <span class="likes-counter">0</span>
                <button class="like-button"></button>
              </div>
            </div>
          </li>
        `;

        inputFormName.value = "";
        inputFormText.value = "";
      });

    </script>
  </body>
  

  <script>
    "use strict";
    // Код писать здесь
    console.log("It works!");
  </script>
</html>
