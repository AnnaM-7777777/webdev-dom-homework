<!DOCTYPE html>
<html>

<head>
  <title>Проект "Комменты"</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <ul class="comments" id="commentsList">
    </ul>

    <!-- Форма отправки комментария -->
    <div class="add-form">
      <input class="add-form-name" type="text" placeholder="Введите ваше имя" id="addFormName" />

      <textarea class="add-form-text" type="textarea" placeholder="Введите ваш коментарий" rows="4"
        id="addFormText"></textarea>

      <div class="add-form-row">
        <button class="add-form-button" id="addFormButton" type="button">Написать</button>
      </div>
    </div>
  </div>
  
  <script>
    let comments = [
      {
        name: 'Глеб Фокин',
        date: '12.02.22 12:18',
        text: 'Это будет первый комментарий на этой странице',
        likes: 3,
        isLiked: false,
      },

      {
        name: 'Варвара Н.',
        date: '13.02.22 19:22',
        text: 'Мне нравится как оформлена эта страница! ❤',
        likes: 75,
        isLiked: true,
      },
    ];

    const commentsList = document.getElementById("commentsList");
    const addFormName = document.getElementById("addFormName");
    const addFormText = document.getElementById("addFormText");
    const addFormButton = document.getElementById("addFormButton");
    const formatter = new Intl.DateTimeFormat('ru-RU', {
      year: '2-digit',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
    });

    // Функция для экранирования опасных символов
    function sanitizeHtml(text) {
      let sanitize = text.replace(/&/g, '&')
                 .replace(/</g, '<')
                 .replace(/>/g, '>')
                 .replace(/"/g, '"')
                 .replace(/'/g, "'");
      return sanitize;
    }

   function renderComments() {
  commentsList.innerHTML = "";

  comments.forEach((comment, index) => {
    const commentElement = document.createElement("li");
    commentElement.classList.add("comment");
    commentElement.dataset.commentIndex = index;

    const commentHeaderDiv = document.createElement('div');
    commentHeaderDiv.classList.add('comment-header');
    commentHeaderDiv.innerHTML = `<div>${sanitizeHtml(comment.name)}</div><div>${comment.date}</div>`;

    const commentTextDiv = document.createElement('div');
    commentTextDiv.classList.add('comment-text');
    commentTextDiv.textContent = sanitizeHtml(comment.text); // Используем textContent

    const commentBodyDiv = document.createElement('div');
    commentBodyDiv.classList.add('comment-body');
    commentBodyDiv.appendChild(commentTextDiv);

    const commentFooterDiv = document.createElement('div');
    commentFooterDiv.classList.add('comment-footer');
    commentFooterDiv.innerHTML = `
      <div class="like">
        <span class="like-counter">${comment.likes}</span>
        <button class="like-button ${comment.isLiked ? 'liked' : ''}" data-index="${index}"></button>
      </div>
    `;

    commentElement.appendChild(commentHeaderDiv);
    commentElement.appendChild(commentBodyDiv);
    commentElement.appendChild(commentFooterDiv);

    commentsList.appendChild(commentElement);
  });
}


    function likeComment(index) {
      if (comments[index].isLiked === false) {
        comments[index].likes++;
        comments[index].isLiked = true;
      } else {
        comments[index].likes--;
        comments[index].isLiked = false;
      }
    }

    // Ответ на комментарий
    function replyToComment(commentIndex) {
      const comment = comments[commentIndex];

      addFormText.value = `> ${sanitizeHtml(comment.name)}: "${sanitizeHtml(comment.text)}"\n ${''}`;  // Заменяем \n на 
      addFormText.focus();
    }

    function addComment() {

      addFormName.classList.remove("error");
      addFormText.classList.remove("error");

      if (!validateForm(addFormName, addFormText)) {
        return;
      }

      const newComment = createCommentObject(addFormName.value, addFormText.value);
      comments.push(newComment);

      addFormName.value = "";
      addFormText.value = "";

      renderComments();
    }

    function validateForm(nameInput, textInput) {
      let isValid = true;
      if (nameInput.value.trim() === '') {
        nameInput.classList.add("error");
        isValid = false;
      }

      if (textInput.value.trim() === '') {
        textInput.classList.add("error");
        isValid = false;
      }
      
      return isValid;
    }

    function createCommentObject(name, text) {
      const formattedDate = formatter.format(new Date());
      return {
        name: sanitizeHtml(name),
        date: formattedDate,
        text: sanitizeHtml(text),
        likes: 0,
        isLiked: false,
      };
    }

    // Делегирование событий
    commentsList.addEventListener('click', (event) => {
      if (event.target.classList.contains('like-button')) {
        const index = event.target.dataset.index;
        likeComment(index);
        renderComments();
      } else if (event.target.closest('.comment')) {
        const commentIndex = event.target.closest('.comment').dataset.commentIndex;
        replyToComment(commentIndex);
      }
    });

    addFormButton.addEventListener('click', addComment);

    renderComments();

  </script>
</body>

</html>
