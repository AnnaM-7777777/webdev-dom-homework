<!DOCTYPE html>
<html>

<head>
  <title>Проект "Комменты"</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <ul class="comments" id="commentsList">
    </ul>

    <!-- Форма отправки комментария -->
    <div class="add-form">
      <input type="text" class="add-form-name" placeholder="Введите ваше имя" id="addFormName" />

      <textarea type="textarea" class="add-form-text" placeholder="Введите ваш коментарий" rows="4"
        id="addFormText"></textarea>

      <div class="add-form-row">
        <button class="add-form-button" id="addFormButton" type="button">Написать</button>
      </div>
    </div>
  </div>

  <script>
    let comments = [
      {
        name: 'Глеб Фокин',
        date: '12.02.22 12:18',
        text: 'Это будет первый комментарий на этой странице',
        likes: 3,
        isLiked: false,
      },
      {
        name: 'Варвара Н.',
        date: '13.02.22 19:22',
        text: 'Мне нравится как оформлена эта страница! ❤',
        likes: 75,
        isLiked: true,
      },
    ];

    function renderComments() {
      const commentsList = document.getElementById("commentsList");

      // Очищаем список комментариев перед перерисовкой
      commentsList.innerHTML = "";

      comments.forEach((comment, index) => {
        const commentElement = document.createElement("li");
        commentElement.classList.add("comment");

        commentElement.innerHTML = `
            <div class="comment-header">
              <div>${comment.name}</div>
              <div>${comment.date}</div>
            </div>
            <div class="comment-body">
              <div class="comment-text">
                ${comment.text}
              </div>
            </div>
            <div class="comment-footer">
              <div class="like">
                <span class="like-counter">${comment.likes}</span>
                <button class="like-button ${comment.isLiked ? 'liked' : ''}" data-index="${index}"></button>
              </div>
            </div>
          `;
        commentsList.appendChild(commentElement);
      });

      // Добавляем обработчики клика на кнопки лайков после отрисовки
      document.querySelectorAll('.like-button').forEach(button => {
        button.addEventListener('click', likeComment);
      });
    }

    // Функция для добавления нового комментария
    document.getElementById('addFormButton').addEventListener('click', function () {
      const commentsList = document.getElementById("commentsList");
      const button = document.getElementById("addFormButton");
      const inputFormName = document.getElementById("addFormName");
      const inputFormText = document.getElementById("addFormText");

      // Валидация полей
      inputFormName.classList.remove("error");
      inputFormText.classList.remove("error");

      if (inputFormName.value.trim() === '' || inputFormText.value.trim() === '') {

        // Добавляем класс "error" к полям, которые не прошли проверку
        if (inputFormName.value.trim() === '') {
          inputFormName.classList.add("error");
        }

        if (inputFormText.value.trim() === '') {
          inputFormText.classList.add("error");
        }

        return;
      }

      const dateElement = new Date().toLocaleString(); // Находим элемент, в который будет выводиться дата

      const options = {
        year: '2-digit', // Указываем, что год должен отображаться двумя цифрами
        month: '2-digit', // Указываем, что месяц должен отображаться двумя цифрами
        day: '2-digit', // Указываем, что день должен отображаться двумя цифрами
        hour: '2-digit', // Указываем, что часы должны отображаться двумя цифрами
        minute: '2-digit', // Указываем, что минуты должны отображаться двумя цифрами
      };

      const formattedDate = new Date().toLocaleString('ru-RU', options); // Форматируем дату и выводим её в элемент
      const formattedDateNew = formattedDate.replace(',', ''); // Убираем запятую после даты и выводим дату в элемент

      // Создаём новый комментарий
      comments.push({
        name: inputFormName.value,
        date: formattedDateNew,
        text: inputFormText.value,
        likes: 0,
        isLiked: false,
      });

      inputFormName.value = "";
      inputFormText.value = "";

      // Перерисовываем комментарии
      renderComments();
    });

    function likeComment() {
      const index = this.dataset.index;
      if (comments[index].isLiked === false) {
        comments[index].likes++;
        comments[index].isLiked = true;
      } else {
        comments[index].likes--;
        comments[index].isLiked = false;
      }
      renderComments();
    };

    // При загрузке страницы отрисовываем комментарии
    renderComments();
  </script>
</body>

</html>
